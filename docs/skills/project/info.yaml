name: project.info
description: 查询工程概要（等同 project.open）。
triggers:
  - 需要了解当前工程状态但不修改
params:
  path: 工程文件路径（必填）
example:
  request:
    jsonrpc: "2.0"
    id: 1
    method: project.info
    params:
      path: "demo/led_blink.pcbproj"
common_errors:
  - code: USER_ERROR
    when: "path 缺失"
  - code: SYSTEM_ERROR
    when: "读文件失败"
