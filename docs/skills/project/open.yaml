name: project.open
description: 打开已存在的工程，返回元数据。
triggers:
  - 继续已有设计
params:
  path: 工程文件路径（必填）
example:
  request:
    jsonrpc: "2.0"
    id: 1
    method: project.open
    params:
      path: "demo/led_blink.pcbproj"
common_errors:
  - code: USER_ERROR
    when: "path 不存在或不是合法 JSON"
  - code: SYSTEM_ERROR
    when: "读文件失败"
