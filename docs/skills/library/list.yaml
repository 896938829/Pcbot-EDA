name: library.list
description: 列出元件库中全部符号与元件条目。
triggers:
  - 需要找可用元件但不确定关键字
  - 用户请求"有哪些电阻"等粗查询
params:
  lib_root: 库目录路径（必填，或给 project）
  project: 工程路径（可选；自动推导 lib_root 为 <project_dir>/library）
example:
  request:
    jsonrpc: "2.0"
    id: 1
    method: library.list
    params:
      lib_root: "demo/library"
common_errors:
  - code: USER_ERROR
    when: "lib_root 与 project 均缺失"
  - code: SYSTEM_ERROR
    when: "目录不存在"
