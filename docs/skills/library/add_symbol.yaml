name: library.add_symbol
description: 向元件库写入一个符号（*.sym.json）。
triggers:
  - 设计用到的元件库中没有对应符号
  - 构建 demo 元件库
params:
  lib_root: 库目录路径（必填）
  id: 符号 id（必填）
  name: 显示名
  pins: "[{number, name, pos:[x_nm,y_nm], dir}]"
  rel_path: 相对路径，默认 symbols/<id>.sym.json
example:
  request:
    jsonrpc: "2.0"
    id: 1
    method: library.add_symbol
    params:
      lib_root: "demo/library"
      id: "LED"
      name: "LED"
      pins:
        - number: "1"
          name: "A"
          pos: [0, 0]
          dir: "left"
        - number: "2"
          name: "K"
          pos: [2540000, 0]
          dir: "right"
common_errors:
  - code: USER_ERROR
    when: "id 为空"
  - code: SYSTEM_ERROR
    when: "写文件失败"
